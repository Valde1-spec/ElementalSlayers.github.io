<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits Tier Maker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: #ffcc00; text-shadow: 2px 2px #000; }

        .tier-container {
            width: 90%;
            max-width: 800px;
            background: #333;
            border: 2px solid #000;
            margin-bottom: 20px;
        }

        .tier-row {
            display: flex;
            min-height: 80px;
            border-bottom: 1px solid #444;
        }

        .tier-label {
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Farver til Tiers */
        .s-tier { background-color: #ff7f7f; }
        .a-tier { background-color: #ffbf7f; }
        .b-tier { background-color: #ffff7f; }
        .c-tier { background-color: #7fff7f; }
        .f-tier { background-color: #7f7fff; }

        .tier-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            gap: 10px;
        }

        .fruit-bank {
            width: 90%;
            max-width: 800px;
            background: #222;
            padding: 20px;
            border: 2px dashed #555;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .fruit {
            width: 60px;
            height: 60px;
            background-color: #555;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            font-size: 0.7rem;
            text-align: center;
            border-radius: 5px;
            user-select: none;
        }

        .fruit:active { cursor: grabbing; }
    </style>
</head>
<body>

    <h1>Blox Fruits Tier List</h1>

    <div class="tier-container">
        <div class="tier-row">
            <div class="tier-label s-tier">S</div>
            <div class="tier-content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label a-tier">A</div>
            <div class="tier-content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label b-tier">B</div>
            <div class="tier-content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label c-tier">C</div>
            <div class="tier-content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label f-tier">F</div>
            <div class="tier-content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
    </div>

    <h3>Frugter (Træk dem op)</h3>
    <div class="fruit-bank" id="bank" ondrop="drop(event)" ondragover="allowDrop(event)">
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="kitsune">Kitsune</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="leopard">Leopard</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="dough">Dough</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="dragon">Dragon</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="magma">Magma</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="buddha">Buddha</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="ice">Ice</div>
        <div class="fruit" draggable="true" ondragstart="drag(event)" id="rocket">Rocket</div>
    </div>

    <script>
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            // Sikrer at vi dropper i tier-content eller banken, ikke ovenpå en anden frugt
            let target = ev.target;
            if (target.classList.contains('tier-content') || target.id === 'bank') {
                target.appendChild(document.getElementById(data));
            }
        }
    </script>

</body>
</html>
