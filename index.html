<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tier Maker</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --tier-label-width: 100px;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Tier Container */
        #tier-container {
            width: 100%;
            max-width: 800px;
            border: 2px solid #333;
        }

        .tier-row {
            display: flex;
            min-height: 80px;
            border-bottom: 1px solid #333;
            background-color: #222;
        }

        .tier-label {
            width: var(--tier-label-width);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            text-align: center;
            padding: 5px;
            cursor: default;
        }

        /* Tier Colors */
        .s-tier { background-color: #ff7f7f; }
        .a-tier { background-color: #ffbf7f; }
        .b-tier { background-color: #ffff7f; }
        .c-tier { background-color: #7fff7f; }

        .tier-dropzone {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            gap: 10px;
        }

        /* Draggable Items */
        .item-bank {
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            min-height: 100px;
            background-color: #333;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-radius: 8px;
        }

        .draggable {
            width: 60px;
            height: 60px;
            background-color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
            font-size: 12px;
            border: 2px solid #fff;
            text-align: center;
        }

        .draggable:active {
            cursor: grabbing;
        }

        .dragging {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>Custom Tier List</h1>

    <div id="tier-container">
        <div class="tier-row">
            <div class="tier-label s-tier">S</div>
            <div class="tier-dropzone"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label a-tier">A</div>
            <div class="tier-dropzone"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label b-tier">B</div>
            <div class="tier-dropzone"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label c-tier">C</div>
            <div class="tier-dropzone"></div>
        </div>
    </div>

    <h3>Items</h3>
    <div class="item-bank tier-dropzone" id="bank">
        <div class="draggable" draggable="true">Pizza</div>
        <div class="draggable" draggable="true">Tacos</div>
        <div class="draggable" draggable="true">Sushi</div>
        <div class="draggable" draggable="true">Burgers</div>
        <div class="draggable" draggable="true">Salad</div>
    </div>

    <script>
        const draggables = document.querySelectorAll('.draggable');
        const dropzones = document.querySelectorAll('.tier-dropzone');

        draggables.forEach(draggable => {
            // Start Dragging
            draggable.addEventListener('dragstart', () => {
                draggable.classList.add('dragging');
            });

            // End Dragging
            draggable.addEventListener('dragend', () => {
                draggable.classList.remove('dragging');
            });
        });

        dropzones.forEach(zone => {
            zone.addEventListener('dragover', e => {
                // Necessary to allow dropping
                e.preventDefault();
                const draggingItem = document.querySelector('.dragging');
                zone.appendChild(draggingItem);
            });
        });
    </script>
</body>
</html>
