<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElementalSlayers | Restricted Access</title>
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #ff0055;
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Hidden content style */
        #secret-content {
            display: none; /* Stays hidden until password is correct */
            text-align: center;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-top: 50px;
        }

        .gate-container {
            text-align: center;
            border: 2px solid var(--primary);
            padding: 40px;
            border-radius: 15px;
            background: #16161a;
            box-shadow: 0 0 20px var(--primary);
        }

        input {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background: var(--primary);
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
        }

        .congrats-msg {
            color: #00ff88;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff88;
        }

        .link-box {
            background: #1c1c22;
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 500px;
            border: 1px solid #333;
        }

        .btn {
            display: block;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .yt-btn { background: #ff0000; }
        .discord-btn { background: #5865F2; }
        
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

    </style>
</head>
<body>

    <!-- The Password Screen -->
    <div id="password-gate" class="gate-container">
        <h1>ACCESS RESTRICTED</h1>
        <p>Enter the password to enter ElementalSlayers</p>
        <input type="password" id="passInput" placeholder="Password...">
        <button onclick="checkPassword()">ENTER</button>
        <p id="error" style="color: red; margin-top: 10px;"></p>
    </div>

    <!-- The Secret Content (Hidden by default) -->
    <div id="secret-content">
        <h1 class="congrats-msg">Congratulations!</h1>
        <p>You can now go to my channel and join the community.</p>

        <div class="link-box">
            <a href="https://www.youtube.com/@Elemental_slayers-1" class="btn yt-btn" target="_blank">GO TO MY YOUTUBE CHANNEL</a>
            <a href="https://discord.gg/R3DfqtrFYY" class="btn discord-btn" target="_blank">JOIN MY DISCORD</a>
        </div>
        
        <p style="color: #666; margin-top: 50px;">Welcome to the inner circle.</p>
    </div>

    <script>
        function checkPassword() {
            var password = document.getElementById("passInput").value;
            // The password you requested
            if (password === "iceandfire") {
                document.getElementById("password-gate").style.display = "none";
                document.getElementById("secret-content").style.display = "block";
                document.body.style.overflow = "auto";
            } else {
                document.getElementById("error").innerHTML = "Incorrect Password. Try again!";
            }
        }

        // Allow pressing "Enter" key to submit
        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
    </script>

</body>
</html>
